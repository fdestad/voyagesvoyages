<!DOCTYPE html>
<html lang="fr">
<head><link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1C3557">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Voyages</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>

<style>
/* =============================================
   DESIGN TOKENS
   ============================================= */
:root {
  --cream:       #F5EFE0;
  --cream-dark:  #EDE4CF;
  --orange:      #E07B39;
  --orange-deep: #C05E1F;
  --orange-pale: #F5C49A;
  --teal:        #2A7F7F;
  --navy:        #1C3557;
  --ink:         #2C2418;
  --ink-mid:     #5C4E38;
  --ink-soft:    #9C8E78;
  --white:       #FFFDF7;
  --shadow-sm:   0 2px 8px rgba(44,36,24,.10);
  --shadow-md:   0 6px 24px rgba(44,36,24,.15);
  --shadow-lg:   0 16px 48px rgba(44,36,24,.20);
  --radius:      14px;
  --radius-sm:   8px;
  --transition:  0.22s cubic-bezier(.4,0,.2,1);
}

/* =============================================
   RESET & BASE
   ============================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100%;
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--ink);
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

.azulejo-bg {
  background-color: var(--cream);
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23E07B39' stroke-width='0.6' opacity='0.18'%3E%3Crect x='5' y='5' width='50' height='50' rx='3'/%3E%3Crect x='12' y='12' width='36' height='36' rx='2'/%3E%3Ccircle cx='30' cy='30' r='10'/%3E%3Cline x1='5' y1='5' x2='25' y2='25'/%3E%3Cline x1='55' y1='5' x2='35' y2='25'/%3E%3Cline x1='5' y1='55' x2='25' y2='35'/%3E%3Cline x1='55' y1='55' x2='35' y2='35'/%3E%3C/g%3E%3C/svg%3E");
}

#app {
  width: 100vw;
  height: 100vh;
  position: relative;
}

.view {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  width: 100%; height: 100%;
  display: none;
  flex-direction: column;
  background: var(--cream);
  overflow: hidden;
}
/* La classe active gère l'affichage. Par défaut, l'accueil l'a. */
.view.active {
  display: flex;
}

/* =============================================
   VUE : ACCUEIL
   ============================================= */
#view-home {
  align-items: center;
  overflow-y: auto;
  padding: 40px 24px;
}

.home-header {
  text-align: center;
  margin-bottom: 40px;
}
.home-header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 36px;
  color: var(--navy);
  margin-bottom: 12px;
}
.home-header p {
  color: var(--ink-soft);
  font-size: 15px;
  line-height: 1.5;
}

.btn-large-primary {
  width: 100%;
  max-width: 320px;
  padding: 16px;
  border-radius: 30px;
  background: var(--orange);
  color: white;
  border: none;
  font-size: 16px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  box-shadow: var(--shadow-md);
  transition: var(--transition);
  margin-bottom: 40px;
}
.btn-large-primary:active { transform: scale(0.96); }

.btn-large-secondary {
  width: 100%;
  max-width: 320px;
  padding: 14px;
  border-radius: 30px;
  background: var(--navy);
  color: white;
  border: none;
  font-size: 15px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: var(--transition);
  margin-bottom: 40px;
  margin-top: -28px;
}
.btn-large-secondary:active { transform: scale(0.96); }

#home-trips-section {
  width: 100%;
  max-width: 400px;
}
.section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--ink-mid);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-bottom: 16px;
  border-bottom: 1px solid var(--cream-dark);
  padding-bottom: 8px;
}

#home-trips-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.home-trip-card {
  background: var(--white);
  border: 1.5px solid var(--cream-dark);
  border-radius: var(--radius);
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: var(--transition);
}
.home-trip-card:active { background: var(--cream); transform: translateY(2px); }
.htc-color {
  width: 16px; height: 16px;
  border-radius: 50%;
  flex-shrink: 0;
}
.htc-info { flex: 1; }
.htc-name { font-weight: 700; font-size: 16px; color: var(--ink); margin-bottom: 4px; }
.htc-meta { font-size: 13px; color: var(--ink-soft); }
.htc-del {
  padding: 8px;
  color: var(--ink-soft);
  font-size: 18px;
  background: none; border: none;
}

/* =============================================
   VUE : VOYAGE DETAIL
   ============================================= */
#view-trip { background: var(--white); }

.view-header {
  display: flex;
  align-items: center;
  padding: 16px;
  background: var(--navy);
  color: var(--white);
  gap: 16px;
  box-shadow: var(--shadow-sm);
  z-index: 10;
}
.btn-back-home {
  background: rgba(255,255,255,0.15);
  border: none;
  color: white;
  padding: 8px 12px;
  border-radius: 20px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
}
.btn-nav-map {
  background: rgba(255,255,255,0.15);
  border: none;
  color: white;
  padding: 8px 12px;
  border-radius: 20px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  margin-left: auto;
}

#voyage-header {
  padding: 16px;
  border-bottom: 1px solid var(--cream-dark);
  background: var(--cream);
}
#voyage-name-wrap {
  display: flex; align-items: center; gap: 10px;
}
#voyage-color-dot {
  width: 16px; height: 16px; border-radius: 50%;
  flex-shrink: 0; border: 2px solid rgba(0,0,0,.1);
}
#voyage-name-input {
  flex: 1; font-family: 'Playfair Display', serif;
  font-size: 22px; font-weight: 700; color: var(--ink);
  border: none; background: transparent; outline: none;
}
.voyage-meta { font-size: 13px; color: var(--ink-soft); margin-top: 6px; margin-left: 26px; }

#search-zone {
  padding: 16px; background: var(--white);
  border-bottom: 1px solid var(--cream-dark); z-index: 5;
}
#search-wrap { position: relative; }
#search-input {
  width: 100%; padding: 12px 14px 12px 38px;
  border: 2px solid var(--cream-dark); border-radius: var(--radius-sm);
  font-size: 15px; font-family: inherit; outline: none;
}
#search-input:focus { border-color: var(--orange); }
#search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--ink-soft); font-size: 16px; pointer-events: none;
}

#autocomplete {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: var(--white); border: 1px solid var(--cream-dark);
  border-radius: var(--radius-sm); box-shadow: var(--shadow-lg);
  max-height: 250px; overflow-y: auto; z-index: 9999; display: none;
}
#autocomplete.open { display: block; }
.ac-item {
  padding: 12px 16px; cursor: pointer;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--cream-dark);
}
.ac-item .city-pin { font-size: 16px; }
.ac-item .city-name { font-size: 15px; font-weight: 500; color: var(--ink); }
.ac-item .city-country { font-size: 12px; color: var(--ink-soft); }

#btn-manual-add {
  display: block; width: 100%; margin-top: 12px;
  background: none; border: 1px dashed var(--ink-soft);
  color: var(--ink-mid); padding: 10px; font-size: 13px;
  border-radius: var(--radius-sm); cursor: pointer;
  font-family: inherit; font-weight: 500;
}

#etapes-list {
  flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 100px;
}

/* ── ROW : handle + num + card ── */
.etape-item {
  display: flex; align-items: flex-start; gap: 10px;
  margin-bottom: 12px; position: relative;
}
.etape-item:not(:last-child)::after {
  content: ''; position: absolute; left: 38px; top: 32px; width: 2px; bottom: -8px;
  background: var(--cream-dark); z-index: 0;
}

/* drag handle */
.etape-handle {
  width: 20px; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 4px; padding-top: 8px; cursor: grab; flex-shrink: 0;
  opacity: 0.35; transition: opacity 0.15s;
  touch-action: none;
}
.etape-handle:active { cursor: grabbing; }
.etape-item:hover .etape-handle { opacity: 0.7; }
.etape-handle span {
  display: block; width: 14px; height: 2px; background: var(--ink-mid); border-radius: 2px;
}

.etape-num {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--navy); color: white;
  font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; z-index: 1;
}

/* ── CARD ── */
.etape-content {
  flex: 1; background: var(--white); border-radius: var(--radius-sm);
  border: 1.5px solid var(--cream-dark);
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.etape-item.dragging .etape-content {
  box-shadow: var(--shadow-lg); opacity: 0.85;
}
.etape-item.drag-over .etape-content {
  border-color: var(--orange); box-shadow: 0 0 0 2px var(--orange-pale);
}

/* READ VIEW */
.etape-read {
  padding: 12px 14px;
}
.etape-read-top {
  display: flex; justify-content: space-between; align-items: center;
}
.etape-city { font-size: 16px; font-weight: 700; color: var(--ink); }
.etape-country { font-size: 12px; color: var(--ink-soft); margin-top: 1px; }
.etape-read-dates {
  display: flex; align-items: center; gap: 6px;
  margin-top: 8px; font-size: 12px; color: var(--ink-mid);
  font-weight: 500;
}
.etape-read-dates .date-badge {
  background: var(--cream); border-radius: 6px; padding: 3px 8px;
  font-size: 12px; color: var(--ink-mid);
}
.etape-read-notes {
  margin-top: 7px; font-size: 12px; color: var(--ink-mid);
  line-height: 1.5; font-style: italic; padding-left: 2px;
  white-space: pre-wrap;
}

/* ── MÉTÉO ── */
.etape-weather {
  display: flex; align-items: center; gap: 8px;
  margin-top: 8px;
  padding: 6px 10px;
  background: var(--cream); border-radius: 8px;
  font-size: 12px; color: var(--ink-mid);
  min-height: 28px;
}
.etape-weather .wx-icon { font-size: 15px; flex-shrink: 0; }
.etape-weather .wx-label { font-weight: 500; color: var(--ink); }
.etape-weather .wx-temps { color: var(--ink-soft); margin-left: auto; font-size: 11px; font-weight: 600; white-space: nowrap; }
.etape-weather .wx-loading { color: var(--ink-soft); font-style: italic; }
.etape-weather.wx-historical { background: #eef4f0; }
.etape-weather.wx-historical .wx-label { color: var(--teal); }
.btn-edit-etape {
  background: none; border: 1.5px solid var(--cream-dark);
  border-radius: 20px; padding: 4px 12px;
  font-size: 12px; font-weight: 600; color: var(--ink-mid);
  font-family: inherit; cursor: pointer; flex-shrink: 0;
  transition: border-color 0.15s, color 0.15s;
}
.btn-edit-etape:active { background: var(--cream); }

/* EDIT VIEW */
.etape-edit {
  padding: 12px 14px; background: #fffcf7;
  border-top: 2px solid var(--orange);
  display: none;
}
.etape-edit.open { display: block; }
.edit-header {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
}
.edit-header-city { font-size: 14px; font-weight: 700; color: var(--ink); }
.btn-close-edit {
  background: none; border: none; font-size: 18px; color: var(--ink-soft);
  cursor: pointer; padding: 2px 6px; line-height: 1;
}
.edit-label {
  font-size: 11px; font-weight: 700; color: var(--ink-soft);
  text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; margin-top: 10px;
  display: block;
}
.etape-dates-row { display: flex; gap: 8px; align-items: center; }
.etape-date-input {
  flex: 1; font-size: 12px; font-family: inherit;
  border: 1.5px solid var(--cream-dark); border-radius: 6px;
  padding: 6px 8px; background: var(--white); outline: none;
  color: var(--ink);
}
.etape-date-input:focus { border-color: var(--orange); }
.etape-notes-input {
  width: 100%; font-size: 12px; font-family: inherit;
  border: 1.5px solid var(--cream-dark); border-radius: 6px;
  padding: 8px; background: var(--white); outline: none;
  color: var(--ink); resize: vertical; min-height: 56px; line-height: 1.5;
}
.etape-notes-input:focus { border-color: var(--orange); }

/* Color swatches in edit */
.edit-color-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 2px; }
.etape-swatch {
  width: 24px; height: 24px; border-radius: 50%;
  border: 2.5px solid transparent; cursor: pointer;
  transition: transform 0.15s, border-color 0.15s;
}
.etape-swatch.selected { border-color: var(--ink); transform: scale(1.2); }

.edit-actions {
  display: flex; justify-content: flex-end; margin-top: 14px;
}
.btn-del-etape {
  background: none; border: 1.5px solid #e57373;
  color: #c62828; border-radius: 20px;
  padding: 5px 14px; font-size: 12px; font-weight: 700;
  font-family: inherit; cursor: pointer;
}
.btn-del-etape:active { background: #fdecea; }

/* =============================================
   VUE : CARTE
   ============================================= */
#view-map { position: relative; }
#map { flex: 1; width: 100%; height: 100%; background: #e8dfc8; }
#map.selecting { cursor: crosshair; }

.manual-mode-bar {
  position: absolute; top: 0; left: 0; right: 0;
  background: var(--teal); color: white;
  padding: 12px; text-align: center; font-size: 14px; font-weight: 700;
  z-index: 1000; box-shadow: var(--shadow-md); display: none;
}
.manual-mode-bar.active { display: block; }

/* =============================================
   FAB (Floating Action Button)
   ============================================= */
.fab {
  position: absolute; bottom: 24px; right: 24px;
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--orange); color: white; border: none;
  box-shadow: 0 4px 12px rgba(224,123,57,.4); font-size: 24px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 1000; transition: transform 0.2s ease;
}
.fab:active { transform: scale(0.9); }

/* =============================================
   MODAL & TOAST
   ============================================= */
#modal-overlay {
  position: fixed; inset: 0; background: rgba(28,53,87,.7); backdrop-filter: blur(4px);
  z-index: 9000; display: none; align-items: center; justify-content: center;
}
#modal-overlay.open { display: flex; }
#modal {
  background: var(--white); border-radius: var(--radius);
  padding: 24px; width: 90%; max-width: 400px; box-shadow: var(--shadow-lg);
}
.modal-title { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 20px; color: var(--ink); }
.modal-field { margin-bottom: 16px; }
.modal-field label { display: block; font-size: 12px; font-weight: 700; color: var(--ink-soft); margin-bottom: 8px; text-transform: uppercase; }
.modal-field input[type="text"] { width: 100%; padding: 12px; border: 2px solid var(--cream-dark); border-radius: var(--radius-sm); font-size: 16px; font-family: inherit; }
.color-swatches { display: flex; gap: 10px; flex-wrap: wrap; }
.swatch { width: 32px; height: 32px; border-radius: 50%; border: 3px solid transparent; transition: var(--transition); }
.swatch.selected { border-color: var(--ink); transform: scale(1.15); }
.modal-actions { display: flex; gap: 12px; margin-top: 24px; justify-content: flex-end; }
.modal-actions button { padding: 12px 20px; border-radius: 24px; font-size: 15px; font-weight: 700; font-family: inherit; border: none; cursor: pointer; }
.btn-cancel { background: var(--cream); color: var(--ink-mid); }
.btn-confirm { background: var(--orange); color: white; }

#toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: var(--white); padding: 12px 24px;
  border-radius: 30px; font-size: 14px; font-weight: 500;
  opacity: 0; transition: all 0.3s ease; z-index: 9999; white-space: nowrap; pointer-events: none;
}
#toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

/* LEAFLET OVERRIDES */
.leaflet-popup-content-wrapper { border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; }

/* =============================================
   VUE : CARTE GLOBALE
   ============================================= */
#view-global-map { position: absolute; top:0; left:0; right:0; bottom:0; flex-direction: column; }
#global-map { flex: 1; width: 100%; min-height: 0; background: #e8dfc8; }
</style>
</head>
<body>

<div id="app">

  <div id="view-home" class="view azulejo-bg active">
    <div class="home-header">
      <h1>Voyages Voyages</h1>
      <p>plus loin que la nuit et le jour</p>
    </div>
    
    <button class="btn-large-primary" onclick="openNewVoyageModal()">＋ Débuter un voyage</button>
    <button class="btn-large-secondary" id="btn-global-map-home" onclick="navigateGlobalMap()" style="display:none;"> Carte</button>

    <div id="home-trips-section" style="display:none;">
      <div class="section-title">Mes voyages</div>
      <div id="home-trips-list"></div>
    </div>
  </div>

  <div id="view-trip" class="view">
    <header class="view-header">
      <button class="btn-back-home" onclick="navigate('view-home')">🛖 Accueil</button>
      <button class="btn-nav-map" onclick="navigateGlobalMap()">🌍 Carte des voyages</button>
    </header>

    <div id="voyage-header">
      <div id="voyage-name-wrap">
        <div id="voyage-color-dot"></div>
        <input id="voyage-name-input" type="text" placeholder="Nom du voyage"/>
      </div>
      <div class="voyage-meta" id="voyage-meta"></div>
    </div>

    <div id="search-zone">
      <div id="search-wrap">
        <span id="search-icon">🔍</span>
        <input id="search-input" type="text" placeholder="Rechercher une ville…" autocomplete="off"/>
        <div id="autocomplete"></div>
      </div>
      <button id="btn-manual-add" onclick="activateManualMode()">📍 Placer une destination manuellement</button>
    </div>

    <div id="etapes-list"></div>

    <button class="fab" onclick="navigate('view-map')">🗺️</button>
  </div>

  <div id="view-map" class="view">
    <div class="manual-mode-bar" id="manual-mode-bar">
      Cliquez sur la carte pour ajouter une étape
    </div>
    
    <div id="map"></div>
    
    <button class="fab" onclick="cancelManualMode(); navigate('view-trip')">🏛️</button>
  </div>

  <div id="view-global-map" class="view">
    <div class="view-header" style="z-index:10; position:relative;">
      <button class="btn-back-home" id="global-map-back-btn">← Retour</button>
      <span style="font-family:'Playfair Display',serif; font-size:17px; font-weight:700; color:white; margin-left:12px; flex:1;">Tous les voyages</span>
    </div>
    <div id="global-map-legend" style="
      position:absolute; top:64px; left:12px; z-index:900;
      background:rgba(255,253,247,0.93); border-radius:10px;
      padding:10px 14px; box-shadow:var(--shadow-md);
      font-size:13px; max-width:200px; display:none;
    "></div>
    <div id="global-map" style="flex:1; width:100%; min-height:0;"></div>
  </div>

</div>

<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal">
    <div class="modal-title">Nouveau départ 🛩️</div>
    <div class="modal-field">
      <label>Nom du voyage</label>
      <input type="text" id="modal-name" placeholder="ex : Alicante 2026" onkeydown="if(event.key==='Enter')confirmNewVoyage()"/>
    </div>
    <div class="modal-field">
      <label>Couleur</label>
      <div class="color-swatches" id="color-swatches"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-confirm" onclick="confirmNewVoyage()">Créer</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ============================================================
// CONFIGURATION & ETAT
// ============================================================
const VOYAGE_COLORS = ['#E07B39','#2A7F7F','#1C3557','#8B4513','#C44D8C','#4A7C59'];
let state = { voyages: [], activeVoyageId: null };
let cities = [];       
let map, layers = {};  
let manualMode = false;

// ============================================================
// PERSISTANCE & INITIALISATION
// ============================================================
function saveState() { 
  localStorage.setItem('voyages_app_mobi_v3', JSON.stringify(state)); 
}

function loadState() {
  try {
    const raw = localStorage.getItem('voyages_app_mobi_v3');
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && Array.isArray(parsed.voyages)) {
        state = parsed;
      }
    }
  } catch(e) { console.error("Erreur State", e); }
  
  // Sécuriser les données corrompues
  if (!state.voyages) state.voyages = [];
  state.voyages.forEach(v => { if (!v.etapes) v.etapes = []; });
}

// Ce chargement se fait de manière asynchrone SANS bloquer la page d'accueil !
async function loadCities() {
  try {
    const resp = await fetch('./cities.json');
    if (resp.ok) {
      const data = await resp.json();
      if (Array.isArray(data)) cities = data;
    }
  } catch(e) {
    console.log("Villes de secours chargées");
    cities = [
      {name:"Paris",country:"France",lat:48.8566,lon:2.3522},
      {name:"Lyon",country:"France",lat:45.7640,lon:4.8357},
      {name:"Marseille",country:"France",lat:43.2965,lon:5.3698},
      {name:"Madrid",country:"Espagne",lat:40.4168,lon:-3.7038},
      {name:"Barcelone",country:"Espagne",lat:41.3851,lon:2.1734},
      {name:"Rome",country:"Italie",lat:41.9028,lon:12.4964}
    ]; 
  }
}

// ============================================================
// NAVIGATION ENTRE VUES
// ============================================================
function navigate(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(viewId).classList.add('active');
  
  if (viewId === 'view-home') {
    state.activeVoyageId = null;
    renderHome();
  } 
  else if (viewId === 'view-trip') {
    renderTrip();
  } 
  else if (viewId === 'view-map') {
    initMap();
    setTimeout(() => {
      map.invalidateSize(); 
      renderAllMaps();
      fitMapToActiveVoyage();
    }, 100);
  }
}

function renderHome() {
  const section = document.getElementById('home-trips-section');
  const list = document.getElementById('home-trips-list');
  const globalMapBtn = document.getElementById('btn-global-map-home');
  list.innerHTML = '';

  if (state.voyages.length === 0) {
    section.style.display = 'none';
    globalMapBtn.style.display = 'none';
    return;
  }

  globalMapBtn.style.display = 'block';
  section.style.display = 'block';
  state.voyages.forEach(v => {
    const card = document.createElement('div');
    card.className = 'home-trip-card';
    card.onclick = () => { state.activeVoyageId = v.id; navigate('view-trip'); };
    
    const stepsLen = v.etapes ? v.etapes.length : 0;
    const stepsText = stepsLen + (stepsLen > 1 ? ' étapes' : ' étape');
    
    card.innerHTML = `
      <div class="htc-color" style="background:${v.color}"></div>
      <div class="htc-info">
        <div class="htc-name">${v.name}</div>
        <div class="htc-meta">${stepsText}</div>
      </div>
      <button class="htc-del" onclick="deleteVoyage('${v.id}', event)">✕</button>
    `;
    list.appendChild(card);
  });
}

function getActiveVoyage() { 
  return state.voyages.find(v => v.id === state.activeVoyageId); 
}

function formatDate(d) {
  if (!d) return null;
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function buildEtapeItem(e, i, voyage) {
  const item = document.createElement('div');
  item.className = 'etape-item';
  item.dataset.index = i;
  item.draggable = true;

  // Dates display
  let datesHtml = '';
  if (e.dateArr || e.dateDep) {
    const arr = e.dateArr ? `<span class="date-badge">${formatDate(e.dateArr)}</span>` : '';
    const dep = e.dateDep ? `<span class="date-badge">${formatDate(e.dateDep)}</span>` : '';
    const arrow = (e.dateArr && e.dateDep) ? `<span style="color:var(--ink-soft)">→</span>` : '';
    datesHtml = `<div class="etape-read-dates">${arr}${arrow}${dep}</div>`;
  }

  const notesHtml = e.notes 
    ? `<div class="etape-read-notes">${e.notes.replace(/</g,'&lt;')}</div>` 
    : '';

  // Color swatches for edit panel
  const swatchesHtml = VOYAGE_COLORS.map(c => 
    `<div class="etape-swatch${c === voyage.color ? ' selected' : ''}" style="background:${c}" data-color="${c}" onclick="selectVoyageColor(this,'${c}')"></div>`
  ).join('');

  item.innerHTML = `
    <div class="etape-handle"><span></span><span></span><span></span></div>
    <div class="etape-num">${i + 1}</div>
    <div class="etape-content">

      <div class="etape-read">
        <div class="etape-read-top">
          <div>
            <div class="etape-city">${e.city}</div>
            <div class="etape-country">${e.country}</div>
          </div>
          <button class="btn-edit-etape" onclick="toggleEditPanel(this)">Éditer</button>
        </div>
        ${datesHtml}
        <div class="etape-weather" style="display:none;"></div>
        ${notesHtml}
      </div>

      <div class="etape-edit">
        <div class="edit-header">
          <span class="edit-header-city">✏️ ${e.city}</span>
          <button class="btn-close-edit" onclick="toggleEditPanel(this)">✕</button>
        </div>

        <span class="edit-label">Dates</span>
        <div class="etape-dates-row">
          <input class="etape-date-input" type="date" placeholder="Arrivée" value="${e.dateArr||''}" 
            onchange="updateDate(${i},'dateArr',this.value); refreshEtapeReadView(${i}); fetchWeather(getActiveVoyage().etapes[${i}], ${i})"/>
          <span style="font-size:12px;color:var(--ink-soft)">→</span>
          <input class="etape-date-input" type="date" placeholder="Départ" value="${e.dateDep||''}" 
            onchange="updateDate(${i},'dateDep',this.value); refreshEtapeReadView(${i}); fetchWeather(getActiveVoyage().etapes[${i}], ${i})"/>
        </div>

        <span class="edit-label">Notes</span>
        <textarea class="etape-notes-input" placeholder="Hôtel, à faire, idées…" 
          onchange="updateNote(${i},this.value); refreshEtapeReadView(${i})"
          oninput="updateNote(${i},this.value)">${e.notes||''}</textarea>

        <span class="edit-label">Couleur du voyage</span>
        <div class="edit-color-row" data-voyage-colors>${swatchesHtml}</div>

        <div class="edit-actions">
          <button class="btn-del-etape" onclick="removeEtape(${i})">🗑 Supprimer</button>
        </div>
      </div>

    </div>
  `;

  // Drag & drop (mouse)
  item.addEventListener('dragstart', onDragStart);
  item.addEventListener('dragover',  onDragOver);
  item.addEventListener('drop',      onDrop);
  item.addEventListener('dragend',   onDragEnd);

  // Touch drag (long-press → drag)
  const handle = item.querySelector('.etape-handle');
  setupTouchDrag(handle, item);

  return item;
}

function toggleEditPanel(btn) {
  const content = btn.closest('.etape-content');
  const editPanel = content.querySelector('.etape-edit');
  const isOpen = editPanel.classList.contains('open');
  // Close all other open panels first
  document.querySelectorAll('.etape-edit.open').forEach(p => p.classList.remove('open'));
  if (!isOpen) editPanel.classList.add('open');
}

function refreshEtapeReadView(index) {
  const voyage = getActiveVoyage();
  if (!voyage) return;
  const e = voyage.etapes[index];
  const items = document.querySelectorAll('.etape-item');
  const item = [...items].find(it => parseInt(it.dataset.index) === index);
  if (!item) return;

  let datesHtml = '';
  if (e.dateArr || e.dateDep) {
    const arr = e.dateArr ? `<span class="date-badge">${formatDate(e.dateArr)}</span>` : '';
    const dep = e.dateDep ? `<span class="date-badge">${formatDate(e.dateDep)}</span>` : '';
    const arrow = (e.dateArr && e.dateDep) ? `<span style="color:var(--ink-soft)">→</span>` : '';
    datesHtml = `<div class="etape-read-dates">${arr}${arrow}${dep}</div>`;
  }
  const notesHtml = e.notes 
    ? `<div class="etape-read-notes">${e.notes.replace(/</g,'&lt;')}</div>` 
    : '';

  const readTop = item.querySelector('.etape-read-top');
  // Remove old dates/notes (preserve weather badge)
  item.querySelectorAll('.etape-read-dates, .etape-read-notes').forEach(el => el.remove());
  const weatherBadge = item.querySelector('.etape-weather');
  readTop.insertAdjacentHTML('afterend', datesHtml);
  if (weatherBadge) weatherBadge.insertAdjacentHTML('afterend', notesHtml);
  else readTop.insertAdjacentHTML('afterend', datesHtml + notesHtml);
}

function selectVoyageColor(el, color) {
  const voyage = getActiveVoyage();
  if (!voyage) return;
  voyage.color = color;
  saveState();
  // Update all swatch groups
  document.querySelectorAll('[data-voyage-colors] .etape-swatch').forEach(s => {
    s.classList.toggle('selected', s.dataset.color === color);
  });
  document.getElementById('voyage-color-dot').style.background = color;
  // Refresh map markers color
  if (document.getElementById('view-map').classList.contains('active')) {
    renderAllMaps();
  }
}

function updateNote(index, value) {
  const v = getActiveVoyage();
  if (v && v.etapes[index] !== undefined) {
    v.etapes[index].notes = value;
    saveState();
  }
}

function renderTrip() {
  const voyage = getActiveVoyage();
  if (!voyage) return navigate('view-home');

  document.getElementById('voyage-color-dot').style.background = voyage.color;
  document.getElementById('voyage-name-input').value = voyage.name;
  
  const stepsLen = voyage.etapes ? voyage.etapes.length : 0;
  document.getElementById('voyage-meta').textContent = stepsLen + (stepsLen > 1 ? ' étapes' : ' étape');

  const list = document.getElementById('etapes-list');
  list.innerHTML = '';

  if (stepsLen === 0) {
    list.innerHTML = '<div style="text-align:center; padding:40px 20px; color:var(--ink-soft); line-height: 1.5;">Aucune étape.<br>Utilisez la recherche ci-dessus pour commencer.</div>';
    return;
  }

  voyage.etapes.forEach((e, i) => {
    list.appendChild(buildEtapeItem(e, i, voyage));
  });

  // Chargement météo après rendu du DOM
  requestAnimationFrame(fetchWeatherForAllEtapes);
}

// ============================================================
// DRAG & DROP — MOUSE
// ============================================================
let dragSrcIndex = null;

function onDragStart(e) {
  dragSrcIndex = parseInt(this.dataset.index);
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.etape-item').forEach(it => it.classList.remove('drag-over'));
  this.classList.add('drag-over');
}

function onDrop(e) {
  e.preventDefault();
  const targetIndex = parseInt(this.dataset.index);
  if (dragSrcIndex === null || dragSrcIndex === targetIndex) return;
  const voyage = getActiveVoyage();
  const moved = voyage.etapes.splice(dragSrcIndex, 1)[0];
  voyage.etapes.splice(targetIndex, 0, moved);
  saveState();
  renderTrip();
}

function onDragEnd() {
  document.querySelectorAll('.etape-item').forEach(it => {
    it.classList.remove('dragging', 'drag-over');
  });
  dragSrcIndex = null;
}

// ============================================================
// TOUCH DRAG — Long press on handle
// ============================================================
function setupTouchDrag(handle, item) {
  let longPressTimer = null;
  let isDragging = false;
  let startY = 0;
  let clone = null;
  let offsetY = 0;

  handle.addEventListener('touchstart', function(e) {
    startY = e.touches[0].clientY;
    longPressTimer = setTimeout(() => {
      isDragging = true;
      item.classList.add('dragging');
      // Create visual clone
      clone = item.cloneNode(true);
      clone.style.cssText = `
        position:fixed; z-index:9999; width:${item.offsetWidth}px; left:${item.getBoundingClientRect().left}px;
        top:${item.getBoundingClientRect().top}px; opacity:0.88; pointer-events:none;
        box-shadow: 0 16px 48px rgba(44,36,24,.25); transform: scale(1.02);
        transition: none;
      `;
      document.body.appendChild(clone);
      offsetY = startY - item.getBoundingClientRect().top;
      if (navigator.vibrate) navigator.vibrate(40);
    }, 400);
  }, { passive: true });

  handle.addEventListener('touchmove', function(e) {
    if (!isDragging) { clearTimeout(longPressTimer); return; }
    e.preventDefault();
    const y = e.touches[0].clientY;
    clone.style.top = (y - offsetY) + 'px';

    // Find element under touch
    clone.style.display = 'none';
    const el = document.elementFromPoint(e.touches[0].clientX, y);
    clone.style.display = '';
    const targetItem = el ? el.closest('.etape-item') : null;
    document.querySelectorAll('.etape-item').forEach(it => it.classList.remove('drag-over'));
    if (targetItem && targetItem !== item) targetItem.classList.add('drag-over');
  }, { passive: false });

  handle.addEventListener('touchend', function(e) {
    clearTimeout(longPressTimer);
    if (!isDragging) return;
    isDragging = false;
    item.classList.remove('dragging');
    if (clone) { clone.remove(); clone = null; }

    const y = e.changedTouches[0].clientY;
    const el = document.elementFromPoint(e.changedTouches[0].clientX, y);
    const targetItem = el ? el.closest('.etape-item') : null;
    document.querySelectorAll('.etape-item').forEach(it => it.classList.remove('drag-over'));

    if (targetItem && targetItem !== item) {
      const srcIdx = parseInt(item.dataset.index);
      const tgtIdx = parseInt(targetItem.dataset.index);
      const voyage = getActiveVoyage();
      const moved = voyage.etapes.splice(srcIdx, 1)[0];
      voyage.etapes.splice(tgtIdx, 0, moved);
      saveState();
      renderTrip();
    }
  });
}

// CARTE & MODE MANUEL
// ============================================================
function initMap() {
  if (map) return; 
  map = L.map('map', { center: [48, 10], zoom: 4, zoomControl: false });
  L.control.zoom({ position: 'topright' }).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 18 }).addTo(map);
  map.on('click', onMapClick);
}

function renderAllMaps() {
  Object.keys(layers).forEach(id => { map.removeLayer(layers[id]); delete layers[id]; });
  const active = getActiveVoyage();
  if(!active || !active.etapes) return;

  const layer = L.layerGroup().addTo(map);
  layers[active.id] = layer;

  if (active.etapes.length > 1) {
    const coords = active.etapes.map(e => [e.lat, e.lon]);
    L.polyline(coords, { color: active.color, weight: 3, opacity: 0.8, dashArray: '8 5' }).addTo(layer);
  }

  active.etapes.forEach((e, i) => {
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="40" viewBox="0 0 32 40">
      <path d="M16 0C7.163 0 0 7.163 0 16c0 10.844 14 24 16 24s16-13.156 16-24C32 7.163 24.837 0 16 0z" fill="${active.color}"/>
      <circle cx="16" cy="16" r="10" fill="white"/>
      <text x="16" y="20.5" text-anchor="middle" font-size="11" font-family="sans-serif" font-weight="bold" fill="${active.color}">${i+1}</text>
    </svg>`;
    const icon = L.divIcon({ html: svg, className: '', iconSize: [32,40], iconAnchor: [16,40], popupAnchor: [0,-42] });
    L.marker([e.lat, e.lon], { icon }).bindPopup(`<b style="font-size:14px">${e.city}</b><br><span style="color:#888">${e.country}</span>`).addTo(layer);
  });
}

function fitMapToActiveVoyage() {
  const v = getActiveVoyage();
  if (!v || !v.etapes || !v.etapes.length) { map.setView([48, 10], 4); return; }
  const coords = v.etapes.map(e => [e.lat, e.lon]);
  if (coords.length === 1) map.setView(coords[0], 6);
  else map.fitBounds(L.latLngBounds(coords), { padding: [40, 40] });
}

function activateManualMode() {
  manualMode = true;
  document.getElementById('manual-mode-bar').classList.add('active');
  document.getElementById('map').classList.add('selecting');
  navigate('view-map');
}

function cancelManualMode() {
  manualMode = false;
  document.getElementById('manual-mode-bar').classList.remove('active');
  document.getElementById('map').classList.remove('selecting');
}

function onMapClick(e) {
  if (!manualMode) return;
  const cityName = prompt("Nom de cette destination ?");
  if (cityName && cityName.trim()) {
    addEtapeToActiveVoyage({ name: cityName.trim(), country: "Point manuel", lat: e.latlng.lat, lon: e.latlng.lng });
    cancelManualMode();
    navigate('view-trip');
  }
}

const searchInput = document.getElementById('search-input');
const acList = document.getElementById('autocomplete');

searchInput.addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (q.length < 2 || !cities.length) { acList.classList.remove('open'); return; }
  
  let res = cities.filter(c => c.name.toLowerCase().startsWith(q)).slice(0, 5);
  if (!res.length) res = cities.filter(c => c.name.toLowerCase().includes(q)).slice(0, 5);
  
  acList.innerHTML = '';
  if(res.length) {
    res.forEach(c => {
      const div = document.createElement('div');
      div.className = 'ac-item';
      div.innerHTML = `<span class="city-pin">📍</span><div><div class="city-name">${c.name}</div><div class="city-country">${c.country||''}</div></div>`;
      div.onclick = () => { addEtapeToActiveVoyage(c); searchInput.value = ''; acList.classList.remove('open'); };
      acList.appendChild(div);
    });
    acList.classList.add('open');
  } else {
    acList.classList.remove('open');
  }
});

document.addEventListener('click', e => { 
  if (!document.getElementById('search-wrap').contains(e.target)) acList.classList.remove('open'); 
});

// ACTIONS DATA
// ============================================================
function addEtapeToActiveVoyage(city) {
  const v = getActiveVoyage();
  v.etapes.push({ city: city.name, country: city.country, lat: city.lat, lon: city.lon, dateArr: '', dateDep: '', notes: '' });
  saveState(); 
  renderTrip(); 
  toast(`📍 ${city.name} ajouté`);
}

function removeEtape(index) {
  getActiveVoyage().etapes.splice(index, 1);
  saveState(); 
  renderTrip();
}

function updateDate(index, field, value) {
  getActiveVoyage().etapes[index][field] = value;
  saveState();
}

function deleteVoyage(id, e) {
  e.stopPropagation();
  if(confirm("Supprimer ce voyage ?")) {
    state.voyages = state.voyages.filter(v => v.id !== id);
    saveState(); 
    renderHome(); 
    toast("Voyage supprimé");
  }
}

let pendingColor = VOYAGE_COLORS[0];
function openNewVoyageModal() {
  pendingColor = VOYAGE_COLORS[state.voyages.length % VOYAGE_COLORS.length];
  const swatches = document.getElementById('color-swatches');
  swatches.innerHTML = '';
  
  VOYAGE_COLORS.forEach(c => {
    const s = document.createElement('div');
    s.className = 'swatch' + (c === pendingColor ? ' selected' : '');
    s.style.background = c;
    s.onclick = () => { 
      pendingColor = c; 
      swatches.querySelectorAll('.swatch').forEach(x => x.classList.remove('selected')); 
      s.classList.add('selected'); 
    };
    swatches.appendChild(s);
  });
  
  document.getElementById('modal-name').value = '';
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
}

function confirmNewVoyage() {
  const name = document.getElementById('modal-name').value.trim() || 'Nouveau voyage';
  const id = 'v' + Date.now();
  state.voyages.push({ id, name, color: pendingColor, etapes: [] });
  state.activeVoyageId = id;
  closeModal(); 
  saveState();
  navigate('view-trip');
  toast("Voyage créé !");
}

let globalMap, globalLayers = {};

// ============================================================
// CARTE GLOBALE
// ============================================================
function navigateGlobalMap() {
  // Determine where to come back from
  const fromTrip = document.getElementById('view-trip').classList.contains('active');
  document.getElementById('global-map-back-btn').onclick = () => {
    navigate(fromTrip ? 'view-trip' : 'view-home');
  };

  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-global-map').classList.add('active');

  // requestAnimationFrame garantit que le conteneur a une taille avant que Leaflet s'initialise
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      if (!globalMap) {
        globalMap = L.map('global-map', { center: [20, 10], zoom: 2, zoomControl: false });
        L.control.zoom({ position: 'topright' }).addTo(globalMap);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 18 }).addTo(globalMap);
      } else {
        globalMap.invalidateSize();
      }
      renderGlobalMap();
    });
  });
}

function renderGlobalMap() {
  // Clear existing layers
  Object.keys(globalLayers).forEach(id => { globalMap.removeLayer(globalLayers[id]); delete globalLayers[id]; });

  const legend = document.getElementById('global-map-legend');
  legend.innerHTML = '';

  const voyagesWithEtapes = state.voyages.filter(v => v.etapes && v.etapes.length > 0);

  if (voyagesWithEtapes.length === 0) {
    legend.style.display = 'block';
    legend.innerHTML = '<span style="color:var(--ink-soft)">Aucune étape à afficher.</span>';
    globalMap.setView([20, 10], 2);
    return;
  }

  const allCoords = [];

  voyagesWithEtapes.forEach(v => {
    const layer = L.layerGroup().addTo(globalMap);
    globalLayers[v.id] = layer;

    const coords = v.etapes.map(e => [e.lat, e.lon]);
    allCoords.push(...coords);

    if (coords.length > 1) {
      L.polyline(coords, { color: v.color, weight: 3, opacity: 0.8, dashArray: '8 5' }).addTo(layer);
    }

    v.etapes.forEach((e, i) => {
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 32 40">
        <path d="M16 0C7.163 0 0 7.163 0 16c0 10.844 14 24 16 24s16-13.156 16-24C32 7.163 24.837 0 16 0z" fill="${v.color}"/>
        <circle cx="16" cy="16" r="10" fill="white"/>
        <text x="16" y="20.5" text-anchor="middle" font-size="11" font-family="sans-serif" font-weight="bold" fill="${v.color}">${i+1}</text>
      </svg>`;
      const icon = L.divIcon({ html: svg, className: '', iconSize: [28,36], iconAnchor: [14,36], popupAnchor: [0,-38] });
      L.marker([e.lat, e.lon], { icon })
        .bindPopup(`<b style="font-size:13px">${e.city}</b><br><span style="color:#888;font-size:12px">${e.country}</span><br><span style="color:${v.color};font-size:11px;font-weight:600">${v.name}</span>`)
        .addTo(layer);
    });

    // Legend entry
    const entry = document.createElement('div');
    entry.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer;';
    entry.innerHTML = `<span style="width:12px;height:12px;border-radius:50%;background:${v.color};flex-shrink:0;display:inline-block;"></span><span style="color:var(--ink);font-weight:600;">${v.name}</span>`;
    entry.onclick = () => {
      const bounds = L.latLngBounds(coords);
      if (coords.length === 1) globalMap.setView(coords[0], 6);
      else globalMap.fitBounds(bounds, { padding: [40, 40] });
    };
    legend.appendChild(entry);
  });

  legend.style.display = 'block';

  if (allCoords.length === 1) {
    globalMap.setView(allCoords[0], 5);
  } else if (allCoords.length > 1) {
    globalMap.fitBounds(L.latLngBounds(allCoords), { padding: [50, 50] });
  }
}


function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; 
  el.classList.add('visible');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('visible'), 2500);
}

// ============================================================
// MÉTÉO — Open-Meteo (gratuit, sans clé)
// ============================================================
const weatherCache = {}; // clé: "lat,lon,dateArr,dateDep"

// Attribue un score de severite (0 = grand beau, 10 = orages) a un code WMO
function wxCodeToScore(code) {
  if (code === 0)               return 0;
  if (code <= 2)                return 1;
  if (code === 3)               return 2;
  if (code >= 45 && code <= 48) return 3;
  if (code >= 51 && code <= 55) return 4;
  if (code >= 71 && code <= 77) return 5;
  if (code >= 85 && code <= 86) return 5;
  if (code >= 61 && code <= 65) return 6;
  if (code >= 80 && code <= 82) return 6;
  if (code >= 66 && code <= 67) return 7;
  if (code >= 95 && code <= 99) return 10;
  return 3;
}

// Convertit un score moyen en libelle + icone + modificateur nuance
function wxScoreToLabel(avgScore) {
  if (avgScore < 0.5)  return { icon: '☀️',  label: 'Beau temps',     nuance: false };
  if (avgScore < 1.5)  return { icon: '🌤️', label: 'Beau temps',      nuance: avgScore > 1.0 };
  if (avgScore < 2.5)  return { icon: '⛅',  label: 'Quelques nuages', nuance: false };
  if (avgScore < 3.5)  return { icon: '☁️',  label: 'Temps couvert',   nuance: avgScore < 3.0 };
  if (avgScore < 5.0)  return { icon: '🌦️', label: 'Temps mitige',    nuance: avgScore < 4.2 };
  if (avgScore < 6.5)  return { icon: '🌧️', label: 'Pluie',           nuance: avgScore < 5.8 };
  if (avgScore < 8.5)  return { icon: '🌧️', label: 'Mauvais temps',   nuance: avgScore < 7.5 };
  return                        { icon: '⛈️', label: 'Orages',          nuance: true  };
}

// Agrège les données journalières sur une plage de dates
function aggregateDailyData(data, dateArr, dateDep) {
  const times = data.daily.time;
  const tmax  = data.daily.temperature_2m_max;
  const tmin  = data.daily.temperature_2m_min;
  const codes = data.daily.weathercode;

  const from = dateArr || dateDep;
  const to   = dateDep || dateArr;

  const indices = [];
  times.forEach((t, i) => { if (t >= from && t <= to) indices.push(i); });
  if (!indices.length) return null;

  const avgMax   = Math.round(indices.reduce((s, i) => s + tmax[i], 0) / indices.length);
  const avgMin   = Math.round(indices.reduce((s, i) => s + tmin[i], 0) / indices.length);
  // Score moyen pondéré sur tous les jours du séjour
  const avgScore = indices.reduce((s, i) => s + wxCodeToScore(codes[i]), 0) / indices.length;

  return { avgMax, avgMin, avgScore };
}

async function fetchWeather(etape, index) {
  const { lat, lon, dateArr, dateDep } = etape;
  if (!dateArr && !dateDep) return;

  const cacheKey = `${lat},${lon},${dateArr||''},${dateDep||''}`;
  if (weatherCache[cacheKey]) {
    renderWeatherBadge(index, weatherCache[cacheKey]);
    return;
  }

  const badge = document.querySelector(`.etape-item[data-index="${index}"] .etape-weather`);
  if (badge) badge.innerHTML = '<span class="wx-loading">Chargement météo…</span>';

  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const horizon = new Date(today);
  horizon.setDate(today.getDate() + 16);

  const refDate = new Date(dateArr || dateDep);
  const endDate = new Date(dateDep || dateArr);
  const isHistorical = refDate > horizon;

  try {
    let result;
    if (isHistorical) {
      // Normales climatiques : on interroge les mêmes jours sur les 5 dernières années
      const samples = [];
      for (let y = 1; y <= 5; y++) {
        const sArr = dateArr ? shiftYear(dateArr, -y) : null;
        const sDep = dateDep ? shiftYear(dateDep, -y) : null;
        const from = sArr || sDep;
        const to   = sDep || sArr;
        const url = `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${from}&end_date=${to}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto`;
        const resp = await fetch(url);
        if (!resp.ok) continue;
        const data = await resp.json();
        const agg = aggregateDailyData(data, from, to);
        if (agg) samples.push(agg);
      }
      if (!samples.length) { renderWeatherBadge(index, null); return; }
      const avgMax = Math.round(samples.reduce((s, x) => s + x.avgMax, 0) / samples.length);
      const avgMin = Math.round(samples.reduce((s, x) => s + x.avgMin, 0) / samples.length);
      // Score moyen sur tous les échantillons historiques
      const avgScore = samples.reduce((s, x) => s + x.avgScore, 0) / samples.length;
      result = { avgMax, avgMin, avgScore, isHistorical: true };
    } else {
      // Prévisions réelles
      const from = dateArr || dateDep;
      const to   = dateDep || dateArr;
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto&start_date=${from}&end_date=${to}`;
      const resp = await fetch(url);
      if (!resp.ok) { renderWeatherBadge(index, null); return; }
      const data = await resp.json();
      const agg = aggregateDailyData(data, from, to);
      if (!agg) { renderWeatherBadge(index, null); return; }
      result = { ...agg, isHistorical: false };
    }

    weatherCache[cacheKey] = result;
    renderWeatherBadge(index, result);
  } catch(err) {
    console.warn('Météo indisponible', err);
    renderWeatherBadge(index, null);
  }
}

function shiftYear(dateStr, delta) {
  const [y, m, d] = dateStr.split('-').map(Number);
  return `${y + delta}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function renderWeatherBadge(index, result) {
  const badge = document.querySelector(`.etape-item[data-index="${index}"] .etape-weather`);
  if (!badge) return;
  if (!result) { badge.innerHTML = ''; badge.style.display = 'none'; return; }

  const { icon, label, nuance } = wxScoreToLabel(result.avgScore);
  const histPrefix  = result.isHistorical ? '📊' : '';
  const nuancePrefix = (!result.isHistorical && nuance) ? 'Plutôt ' : '';
  const prefix = histPrefix || nuancePrefix;

  badge.classList.toggle('wx-historical', result.isHistorical);
  badge.style.display = 'flex';
  badge.innerHTML = `
    <span class="wx-icon">${icon}</span>
    <span class="wx-label">${prefix}${label}</span>
    <span class="wx-temps">${result.avgMin}° / ${result.avgMax}°</span>
  `;
}

function fetchWeatherForAllEtapes() {
  const voyage = getActiveVoyage();
  if (!voyage) return;
  voyage.etapes.forEach((e, i) => {
    if (e.dateArr || e.dateDep) fetchWeather(e, i);
  });
}
