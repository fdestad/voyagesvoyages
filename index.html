<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Voyages</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>

<style>
/* =============================================
   DESIGN TOKENS — Palette azulejos + voyage
   ============================================= */
:root {
  --cream:       #F5EFE0;
  --cream-dark:  #EDE4CF;
  --orange:      #E07B39;
  --orange-deep: #C05E1F;
  --orange-pale: #F5C49A;
  --teal:        #2A7F7F;
  --teal-light:  #4AA8A8;
  --teal-pale:   #C4E0DF;
  --navy:        #1C3557;
  --navy-light:  #2E5080;
  --ink:         #2C2418;
  --ink-mid:     #5C4E38;
  --ink-soft:    #9C8E78;
  --white:       #FFFDF7;
  --shadow-sm:   0 2px 8px rgba(44,36,24,.10);
  --shadow-md:   0 6px 24px rgba(44,36,24,.15);
  --shadow-lg:   0 16px 48px rgba(44,36,24,.20);
  --radius:      14px;
  --radius-sm:   8px;
  --transition:  0.22s cubic-bezier(.4,0,.2,1);
}

/* =============================================
   RESET & BASE
   ============================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--ink);
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* =============================================
   MOTIF AZULEJOS
   ============================================= */
.azulejo-bg {
  background-color: var(--cream);
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23E07B39' stroke-width='0.6' opacity='0.18'%3E%3Crect x='5' y='5' width='50' height='50' rx='3'/%3E%3Crect x='12' y='12' width='36' height='36' rx='2'/%3E%3Ccircle cx='30' cy='30' r='10'/%3E%3Cline x1='5' y1='5' x2='25' y2='25'/%3E%3Cline x1='55' y1='5' x2='35' y2='25'/%3E%3Cline x1='5' y1='55' x2='25' y2='35'/%3E%3Cline x1='55' y1='55' x2='35' y2='35'/%3E%3C/g%3E%3C/svg%3E");
}

/* =============================================
   LAYOUT — VIEWS (Mobile First)
   ============================================= */
#app {
  width: 100vw;
  height: 100vh;
  position: relative;
}

.view {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  background: var(--cream);
  overflow: hidden;
}
.view.active {
  display: flex;
}

/* =============================================
   VUE : ACCUEIL
   ============================================= */
#view-home {
  align-items: center;
  overflow-y: auto;
  padding: 40px 24px;
}

.home-header {
  text-align: center;
  margin-bottom: 40px;
}
.home-header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  color: var(--navy);
  margin-bottom: 12px;
}
.home-header p {
  color: var(--ink-soft);
  font-size: 15px;
  line-height: 1.5;
}

.btn-large-primary {
  width: 100%;
  max-width: 320px;
  padding: 16px;
  border-radius: 30px;
  background: var(--orange);
  color: white;
  border: none;
  font-size: 16px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  box-shadow: var(--shadow-md);
  transition: var(--transition);
  margin-bottom: 40px;
}
.btn-large-primary:active { transform: scale(0.96); }

#home-trips-section {
  width: 100%;
  max-width: 400px;
}
.section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--ink-mid);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-bottom: 16px;
  border-bottom: 1px solid var(--cream-dark);
  padding-bottom: 8px;
}

#home-trips-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.home-trip-card {
  background: var(--white);
  border: 1.5px solid var(--cream-dark);
  border-radius: var(--radius);
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: var(--transition);
}
.home-trip-card:active { background: var(--cream); transform: translateY(2px); }
.htc-color {
  width: 16px; height: 16px;
  border-radius: 50%;
  flex-shrink: 0;
}
.htc-info { flex: 1; }
.htc-name
