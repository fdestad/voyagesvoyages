<!DOCTYPE html>
<html lang="fr">
<head><link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1C3557">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Voyages</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>

<style>
/* =============================================
   DESIGN TOKENS
   ============================================= */
:root {
  --cream:       #F5EFE0;
  --cream-dark:  #EDE4CF;
  --orange:      #E07B39;
  --orange-deep: #C05E1F;
  --orange-pale: #F5C49A;
  --teal:        #2A7F7F;
  --navy:        #1C3557;
  --ink:         #2C2418;
  --ink-mid:     #5C4E38;
  --ink-soft:    #9C8E78;
  --white:       #FFFDF7;
  --shadow-sm:   0 2px 8px rgba(44,36,24,.10);
  --shadow-md:   0 6px 24px rgba(44,36,24,.15);
  --shadow-lg:   0 16px 48px rgba(44,36,24,.20);
  --radius:      14px;
  --radius-sm:   8px;
  --transition:  0.22s cubic-bezier(.4,0,.2,1);
}

/* =============================================
   RESET & BASE
   ============================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100%;
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--ink);
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

.azulejo-bg {
  background-color: var(--cream);
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23E07B39' stroke-width='0.6' opacity='0.18'%3E%3Crect x='5' y='5' width='50' height='50' rx='3'/%3E%3Crect x='12' y='12' width='36' height='36' rx='2'/%3E%3Ccircle cx='30' cy='30' r='10'/%3E%3Cline x1='5' y1='5' x2='25' y2='25'/%3E%3Cline x1='55' y1='5' x2='35' y2='25'/%3E%3Cline x1='5' y1='55' x2='25' y2='35'/%3E%3Cline x1='55' y1='55' x2='35' y2='35'/%3E%3C/g%3E%3C/svg%3E");
}

#app {
  width: 100vw;
  height: 100vh;
  position: relative;
}

.view {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  width: 100%; height: 100%;
  display: none;
  flex-direction: column;
  background: var(--cream);
  overflow: hidden;
}
.view.active { display: flex; }

/* =============================================
   VUE : ACCUEIL
   ============================================= */
#view-home { align-items: center; overflow-y: auto; padding: 40px 24px 48px; }

.home-header { text-align: center; margin-bottom: 40px; }
.home-header h1 { font-family: 'Playfair Display', serif; font-size: 36px; color: var(--navy); margin-bottom: 12px; }
.home-header p { color: var(--ink-soft); font-size: 15px; line-height: 1.5; }

.btn-large-primary { width: 100%; max-width: 320px; padding: 16px; border-radius: 30px; background: var(--orange); color: white; border: none; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; box-shadow: var(--shadow-md); transition: var(--transition); margin-bottom: 40px; }
.btn-large-primary:active { transform: scale(0.96); }

.btn-large-secondary { width: 100%; max-width: 320px; padding: 14px; border-radius: 30px; background: var(--navy); color: white; border: none; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; box-shadow: var(--shadow-sm); transition: var(--transition); margin-bottom: 40px; margin-top: -28px; }
.btn-large-secondary:active { transform: scale(0.96); }

#home-trips-section { width: 100%; }
.section-title { font-size: 13px; font-weight: 700; color: var(--ink-mid); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 16px; border-bottom: 1px solid var(--cream-dark); padding-bottom: 8px; }

/* ── CAROUSEL ── */
#home-trips-list { position: relative; width: 100vw; margin-left: -24px; padding: 0 24px 12px 24px; overflow: hidden; }
.carousel-track-wrapper { overflow: hidden; width: 100%; cursor: grab; user-select: none; }
.carousel-track-wrapper:active { cursor: grabbing; }
.carousel-track { display: flex; gap: 16px; transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94); will-change: transform; }
.carousel-dots { display: flex; justify-content: center; gap: 6px; margin-top: 16px; }
.carousel-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--cream-dark); transition: all 0.3s ease; cursor: pointer; }
.carousel-dot.active { background: var(--orange); width: 20px; border-radius: 3px; }

/* ── TRIP CARD ── */
.home-trip-card {
  position: relative; flex-shrink: 0;
  width: calc(100vw - 72px); max-width: 340px; height: 220px;
  border-radius: 20px; overflow: hidden; cursor: pointer;
  box-shadow: 0 8px 32px rgba(28,53,87,.25), 0 2px 8px rgba(0,0,0,.15);
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s ease;
  transform: scale(0.97);
}
.home-trip-card.carousel-active-card { transform: scale(1); box-shadow: 0 16px 48px rgba(28,53,87,.35), 0 4px 16px rgba(0,0,0,.2); }
.home-trip-card:active { transform: scale(0.95) !important; }

/* Map container in card */
.htc-map-container {
  position: absolute; inset: 0;
  background: #e8dfc8; z-index: 0;
  pointer-events: none; /* Disable map interaction on home */
}

/* Generative Gradient Overlay */
.htc-overlay {
  position: absolute; inset: 0;
  z-index: 1;
  background: linear-gradient(
    160deg,
    rgba(255,255,255,0.1) 0%,
    rgba(28,53,87,0.4) 50%,
    rgba(0,0,0,0.7) 100%
  );
}

.htc-color-bar { position: absolute; top: 0; left: 0; right: 0; height: 4px; z-index: 5; }

.htc-content { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; z-index: 2; }
.htc-name { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 26px; color: white; text-align: center; text-shadow: 0 2px 12px rgba(0,0,0,0.6); }

.htc-meta-row { position: absolute; bottom: 14px; left: 16px; right: 16px; display: flex; align-items: center; justify-content: space-between; }
.htc-meta { font-size: 12px; color: rgba(255,255,255,0.9); font-weight: 500; text-shadow: 0 1px 4px rgba(0,0,0,0.5); }
.htc-open-btn { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.2); backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.3); border-radius: 50%; color: white; cursor: pointer; }
.htc-del { padding: 8px; color: rgba(255,255,255,0.6); font-size: 18px; background: none; border: none; cursor: pointer; }

/* Barre export/import */
#home-data-bar { display: none; width: 100%; max-width: 400px; margin-top: 28px; padding-top: 16px; border-top: 1px solid var(--cream-dark); justify-content: center; gap: 24px; }
.btn-data { background: none; border: none; font-family: inherit; font-size: 13px; font-weight: 500; color: var(--ink-soft); cursor: pointer; padding: 4px 0; display: flex; align-items: center; gap: 5px; }

/* =============================================
   AUTRES VUES (SANS CHANGEMENTS)
   ============================================= */
#view-trip { background: var(--white); }
.view-header { display: flex; align-items: center; padding: 16px; background: var(--navy); color: var(--white); gap: 16px; box-shadow: var(--shadow-sm); z-index: 10; }
.btn-back-home, .btn-nav-map { background: rgba(255,255,255,0.15); border: none; color: white; padding: 8px 12px; border-radius: 20px; font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; }
.btn-nav-map { margin-left: auto; }

#voyage-header { padding: 16px; border-bottom: 1px solid var(--cream-dark); background: var(--cream); }
#voyage-name-wrap { display: flex; align-items: center; gap: 10px; }
#voyage-color-dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; border: 2px solid rgba(0,0,0,.1); }
#voyage-name-input { flex: 1; font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--ink); border: none; background: transparent; outline: none; }
.voyage-meta { font-size: 13px; color: var(--ink-soft); margin-top: 6px; margin-left: 26px; }

#search-zone { padding: 16px; background: var(--white); border-bottom: 1px solid var(--cream-dark); z-index: 5; }
#search-wrap { position: relative; }
#search-input { width: 100%; padding: 12px 14px 12px 38px; border: 2px solid var(--cream-dark); border-radius: var(--radius-sm); font-size: 15px; font-family: inherit; outline: none; }
#search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--ink-soft); font-size: 16px; }
#autocomplete { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--white); border: 1px solid var(--cream-dark); border-radius: var(--radius-sm); box-shadow: var(--shadow-lg); max-height: 250px; overflow-y: auto; z-index: 9999; display: none; }
#autocomplete.open { display: block; }
.ac-item { padding: 12px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--cream-dark); }
#btn-manual-add { display: block; width: 100%; margin-top: 12px; background: none; border: 1px dashed var(--ink-soft); color: var(--ink-mid); padding: 10px; font-size: 13px; border-radius: var(--radius-sm); cursor: pointer; font-family: inherit; }

#etapes-list { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 100px; }
.etape-item { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; position: relative; }
.etape-item:not(:last-child)::after { content: ''; position: absolute; left: 38px; top: 32px; width: 2px; bottom: -8px; background: var(--cream-dark); z-index: 0; }
.etape-handle { width: 20px; display: flex; flex-direction: column; align-items: center; gap: 4px; padding-top: 8px; cursor: grab; opacity: 0.35; touch-action: none; }
.etape-handle span { display: block; width: 14px; height: 2px; background: var(--ink-mid); border-radius: 2px; }
.etape-num { width: 32px; height: 32px; border-radius: 50%; background: var(--navy); color: white; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; z-index: 1; }
.etape-content { flex: 1; background: var(--white); border-radius: var(--radius-sm); border: 1.5px solid var(--cream-dark); overflow: hidden; transition: box-shadow 0.2s; }

.etape-read { padding: 12px 14px; }
.etape-city { font-size: 16px; font-weight: 700; color: var(--ink); }
.etape-read-dates { display: flex; align-items: center; gap: 6px; margin-top: 8px; font-size: 12px; color: var(--ink-mid); }
.etape-read-dates .date-badge { background: var(--cream); border-radius: 6px; padding: 3px 8px; }

.etape-weather { display: flex; align-items: center; gap: 8px; margin-top: 8px; padding: 6px 10px; background: var(--cream); border-radius: 8px; font-size: 12px; min-height: 28px; }
.wx-temps { margin-left: auto; font-weight: 600; }

.etape-edit { padding: 12px 14px; background: #fffcf7; border-top: 2px solid var(--orange); display: none; }
.etape-edit.open { display: block; }
.etape-date-input, .etape-notes-input { width: 100%; border: 1.5px solid var(--cream-dark); border-radius: 6px; padding: 8px; font-family: inherit; font-size: 12px; margin-top: 4px; }

#view-map, #view-global-map { position: relative; }
#map, #global-map { flex: 1; width: 100%; background: #e8dfc8; }

.fab { position: absolute; bottom: 24px; right: 24px; width: 64px; height: 64px; border-radius: 50%; background: var(--orange); color: white; border: none; box-shadow: 0 4px 12px rgba(224,123,57,.4); font-size: 24px; display: flex; align-items: center; justify-content: center; z-index: 1000; }

#modal-overlay { position: fixed; inset: 0; background: rgba(28,53,87,.7); backdrop-filter: blur(4px); z-index: 9000; display: none; align-items: center; justify-content: center; }
#modal-overlay.open { display: flex; }
#modal { background: var(--white); border-radius: var(--radius); padding: 24px; width: 90%; max-width: 400px; }
.swatch { width: 32px; height: 32px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; }
.swatch.selected { border-color: var(--ink); transform: scale(1.15); }

#toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--ink); color: var(--white); padding: 12px 24px; border-radius: 30px; font-size: 14px; opacity: 0; transition: all 0.3s ease; z-index: 9999; pointer-events: none; }
#toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="app">
  <div id="view-home" class="view azulejo-bg active">
    <div class="home-header">
      <h1>Voyages Voyages</h1>
      <p>plus loin que la nuit et le jour</p>
    </div>
    <button class="btn-large-primary" onclick="openNewVoyageModal()">＋ Débuter un voyage</button>
    <button class="btn-large-secondary" id="btn-global-map-home" onclick="navigateGlobalMap()" style="display:none;">🌍 Carte des voyages</button>
    <div id="home-trips-section" style="display:none;">
      <div class="section-title">Mes voyages</div>
      <div id="home-trips-list">
        <div class="carousel-track-wrapper" id="carousel-wrapper">
          <div class="carousel-track" id="carousel-track"></div>
        </div>
        <div class="carousel-dots" id="carousel-dots"></div>
      </div>
    </div>
    <div id="home-data-bar">
      <button class="btn-data" onclick="exportVoyages()">↓ Exporter</button>
      <button class="btn-data" onclick="document.getElementById('import-input').click()">↑ Importer</button>
      <input type="file" id="import-input" accept=".json" style="display:none" onchange="importVoyages(this)"/>
    </div>
  </div>

  <div id="view-trip" class="view">
    <header class="view-header">
      <button class="btn-back-home" onclick="navigate('view-home')">🛖 Accueil</button>
      <button class="btn-nav-map" onclick="navigateGlobalMap()">🌍 Carte globale</button>
    </header>
    <div id="voyage-header">
      <div id="voyage-name-wrap"><div id="voyage-color-dot"></div><input id="voyage-name-input" type="text"/></div>
      <div class="voyage-meta" id="voyage-meta"></div>
    </div>
    <div id="search-zone">
      <div id="search-wrap">
        <span id="search-icon">🔍</span>
        <input id="search-input" type="text" placeholder="Rechercher une ville…" autocomplete="off"/>
        <div id="autocomplete"></div>
      </div>
      <button id="btn-manual-add" onclick="activateManualMode()">📍 Placer manuellement</button>
    </div>
    <div id="etapes-list"></div>
    <button class="fab" onclick="navigate('view-map')">🗺️</button>
  </div>

  <div id="view-map" class="view">
    <div id="map"></div>
    <button class="fab" onclick="navigate('view-trip')">🏛️</button>
  </div>

  <div id="view-global-map" class="view">
    <div class="view-header">
      <button class="btn-back-home" id="global-map-back-btn">← Retour</button>
      <span style="color:white; font-weight:700;">Tous les voyages</span>
    </div>
    <div id="global-map"></div>
  </div>
</div>

<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal">
    <div class="modal-title">Nouveau départ 🛩️</div>
    <div class="modal-field"><input type="text" id="modal-name" placeholder="ex : Alicante 2026"/></div>
    <div class="color-swatches" id="color-swatches" style="display:flex; gap:10px; margin:15px 0;"></div>
    <div class="modal-actions" style="display:flex; justify-content:flex-end; gap:10px;">
      <button onclick="closeModal()">Annuler</button>
      <button class="btn-confirm" onclick="confirmNewVoyage()" style="background:var(--orange); color:white; padding:10px 20px; border-radius:20px; border:none;">Créer</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ============================================================
// CONFIGURATION & ETAT
// ============================================================
const VOYAGE_COLORS = ['#264653','#2A9D8F','#E9C46A','#F4A261','#E76F51','#CF5C78'];
let state = { voyages: [], activeVoyageId: null };
let map, layers = {};  
let weatherCache = {};
let carouselIndex = 0;

// ============================================================
// PERSISTANCE
// ============================================================
function saveState() { localStorage.setItem('voyages_app_mobi_v3', JSON.stringify(state)); }
function loadState() {
  const raw = localStorage.getItem('voyages_app_mobi_v3');
  if (raw) state = JSON.parse(raw);
  state.voyages.forEach(v => { if (!v.etapes) v.etapes = []; });
}

// ============================================================
// RECHERCHE & AUTOCOMPLETE
// ============================================================
const acList = document.getElementById('autocomplete');
const searchInput = document.getElementById('search-input');
let photonController = null;

searchInput.addEventListener('input', e => {
  const q = e.target.value.trim();
  if (q.length < 2) { acList.classList.remove('open'); return; }
  searchPhoton(q);
});

async function searchPhoton(q) {
  if (photonController) photonController.abort();
  photonController = new AbortController();
  try {
    const resp = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=6&lang=fr`, { signal: photonController.signal });
    const data = await resp.json();
    const results = data.features.map(f => ({
      name: f.properties.name,
      country: f.properties.country || '',
      lat: f.geometry.coordinates[1],
      lon: f.geometry.coordinates[0]
    }));
    renderAutocomplete(results);
  } catch(e) {}
}

function renderAutocomplete(results) {
  acList.innerHTML = '';
  if (!results.length) { acList.classList.remove('open'); return; }
  results.forEach(r => {
    const div = document.createElement('div');
    div.className = 'ac-item';
    div.innerHTML = `<div><b>${r.name}</b> <small>${r.country}</small></div>`;
    div.onclick = () => { addEtape(r.name, r.country, r.lat, r.lon); acList.classList.remove('open'); searchInput.value = ''; };
    acList.appendChild(div);
  });
  acList.classList.add('open');
}

function addEtape(city, country, lat, lon) {
  const v = getActiveVoyage();
  v.etapes.push({ city, country, lat, lon, id: Date.now(), notes: '', dateArr: '', dateDep: '' });
  saveState();
  renderTrip();
  toast(`📍 ${city} ajouté`);
}

// ============================================================
// VUE ACCUEIL : CAROUSEL & MINI-CARTES
// ============================================================
function renderHome() {
  const section = document.getElementById('home-trips-section');
  const track = document.getElementById('carousel-track');
  const dots = document.getElementById('carousel-dots');
  if (!track) return;

  track.innerHTML = '';
  if (dots) dots.innerHTML = '';

  if (state.voyages.length === 0) {
    section.style.display = 'none';
    document.getElementById('btn-global-map-home').style.display = 'none';
    document.getElementById('home-data-bar').style.display = 'none';
    return;
  }

  section.style.display = 'block';
  document.getElementById('btn-global-map-home').style.display = 'block';
  document.getElementById('home-data-bar').style.display = 'flex';

  state.voyages.forEach((v, idx) => {
    // Dot
    const dot = document.createElement('div');
    dot.className = 'carousel-dot' + (idx === 0 ? ' active' : '');
    dot.onclick = () => goToSlide(idx);
    dots.appendChild(dot);

    // Card
    const card = document.createElement('div');
    card.className = 'home-trip-card' + (idx === 0 ? ' carousel-active-card' : '');
    card.onclick = () => openVoyage(v.id);
    
    // Generative Gradient based on voyage color
    const gradient = `linear-gradient(160deg, ${v.color}22 0%, ${v.color}66 50%, #1C3557EE 100%)`;

    card.innerHTML = `
      <div id="map-card-${v.id}" class="htc-map-container"></div>
      <div class="htc-overlay" style="background: ${gradient}"></div>
      <div class="htc-color-bar" style="background:${v.color}"></div>
      <div class="htc-content">
        <div class="htc-name">${v.name}</div>
      </div>
      <div class="htc-meta-row">
        <div class="htc-meta">${v.etapes.length} étape(s)</div>
        <button class="htc-del" onclick="deleteVoyage('${v.id}', event)">🗑</button>
      </div>
    `;
    track.appendChild(card);
  });

  initCarousel();

  // Initialiser les mini-cartes après rendu
  state.voyages.forEach(v => {
    renderMiniMap(v);
  });
}

function renderMiniMap(v) {
  const container = document.getElementById(`map-card-${v.id}`);
  if (!container) return;
  
  const m = L.map(container, {
    zoomControl: false, attributionControl: false,
    dragging: false, touchZoom: false, scrollWheelZoom: false, doubleClickZoom: false
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(m);

  if (v.etapes && v.etapes.length > 0) {
    const pts = v.etapes.map(e => [e.lat, e.lon]);
    L.polyline(pts, { color: v.color, weight: 3, opacity: 0.6, dashArray: '5, 5' }).addTo(m);
    m.fitBounds(L.latLngBounds(pts).pad(0.5));
  } else {
    m.setView([46, 2], 3); // Europe par défaut
  }
}

// ============================================================
// CAROUSEL LOGIC
// ============================================================
function initCarousel() {
  const wrapper = document.getElementById('carousel-wrapper');
  const track = document.getElementById('carousel-track');
  if (!wrapper || !track) return;

  carouselIndex = 0;
  updateCarousel(true);

  let startX = 0, isDragging = false;
  wrapper.onmousedown = e => { startX = e.pageX; isDragging = true; };
  window.onmousemove = e => {
    if (!isDragging) return;
    const dx = e.pageX - startX;
    if (Math.abs(dx) > 50) {
      if (dx > 0) carouselIndex = Math.max(0, carouselIndex - 1);
      else carouselIndex = Math.min(state.voyages.length - 1, carouselIndex + 1);
      isDragging = false;
      updateCarousel();
    }
  };
  window.onmouseup = () => isDragging = false;
  
  // Touch
  wrapper.ontouchstart = e => { startX = e.touches[0].pageX; isDragging = true; };
  wrapper.ontouchmove = e => {
    if (!isDragging) return;
    const dx = e.touches[0].pageX - startX;
    if (Math.abs(dx) > 50) {
      if (dx > 0) carouselIndex = Math.max(0, carouselIndex - 1);
      else carouselIndex = Math.min(state.voyages.length - 1, carouselIndex + 1);
      isDragging = false;
      updateCarousel();
    }
  };
}

function updateCarousel(instant) {
  const track = document.getElementById('carousel-track');
  const cards = track.querySelectorAll('.home-trip-card');
  if (!cards.length) return;
  const cardW = cards[0].offsetWidth + 16;
  const offset = (window.innerWidth - cards[0].offsetWidth) / 2 - carouselIndex * cardW;
  track.style.transition = instant ? 'none' : 'transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
  track.style.transform = `translateX(${offset}px)`;
  
  cards.forEach((c, i) => c.classList.toggle('carousel-active-card', i === carouselIndex));
  document.querySelectorAll('.carousel-dot').forEach((d, i) => d.classList.toggle('active', i === carouselIndex));
}

function goToSlide(idx) { carouselIndex = idx; updateCarousel(); }

// ============================================================
// METEO (Open-Meteo)
// ============================================================
async function fetchWeather(etape, index) {
  if (!etape.dateArr) return;
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${etape.lat}&longitude=${etape.lon}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto&start_date=${etape.dateArr}&end_date=${etape.dateArr}`;
  try {
    const resp = await fetch(url);
    const data = await resp.json();
    if (data.daily) {
      const t = Math.round(data.daily.temperature_2m_max[0]);
      const badge = document.querySelectorAll('.etape-weather')[index];
      if (badge) {
        badge.innerHTML = `☀️ ${t}°C`;
        badge.style.display = 'flex';
      }
    }
  } catch(e) {}
}

// ============================================================
// NAVIGATION & RENDU VOYAGE
// ============================================================
function navigate(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'view-home') renderHome();
  if (id === 'view-map') { setTimeout(() => { initMap(); renderTripMap(); }, 100); }
}

function openVoyage(id) { state.activeVoyageId = id; navigate('view-trip'); renderTrip(); }
function getActiveVoyage() { return state.voyages.find(v => v.id === state.activeVoyageId); }

function renderTrip() {
  const v = getActiveVoyage();
  if (!v) return;
  document.getElementById('voyage-name-input').value = v.name;
  document.getElementById('voyage-color-dot').style.background = v.color;
  
  const list = document.getElementById('etapes-list');
  list.innerHTML = '';
  v.etapes.forEach((e, i) => {
    const div = document.createElement('div');
    div.className = 'etape-item';
    div.innerHTML = `
      <div class="etape-num">${i+1}</div>
      <div class="etape-content">
        <div class="etape-read" onclick="this.nextElementSibling.classList.toggle('open')">
          <div class="etape-city">${e.city}</div>
          <div class="etape-read-dates"><span class="date-badge">${e.dateArr || '...'}</span></div>
          <div class="etape-weather" style="display:none"></div>
        </div>
        <div class="etape-edit">
          <input type="date" value="${e.dateArr}" onchange="updateEtape(${i}, 'dateArr', this.value)">
          <textarea placeholder="Notes..." onchange="updateEtape(${i}, 'notes', this.value)">${e.notes}</textarea>
          <button onclick="removeEtape(${i})" style="color:red; margin-top:10px; border:none; background:none;">Supprimer</button>
        </div>
      </div>
    `;
    list.appendChild(div);
    fetchWeather(e, i);
  });
}

function updateEtape(i, field, val) { getActiveVoyage().etapes[i][field] = val; saveState(); }
function removeEtape(i) { getActiveVoyage().etapes.splice(i, 1); saveState(); renderTrip(); }

// ============================================================
// CARTES (LEAFLET)
// ============================================================
function initMap() {
  if (map) return;
  map = L.map('map').setView([48, 2], 5);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
}

function renderTripMap() {
  const v = getActiveVoyage();
  if (layers[v.id]) map.removeLayer(layers[v.id]);
  const lg = L.layerGroup().addTo(map);
  layers[v.id] = lg;
  
  const pts = v.etapes.map(e => {
    L.marker([e.lat, e.lon]).addTo(lg).bindPopup(e.city);
    return [e.lat, e.lon];
  });
  if (pts.length > 1) L.polyline(pts, { color: v.color }).addTo(lg);
  if (pts.length > 0) map.fitBounds(L.latLngBounds(pts));
}

// ============================================================
// EXPORT / IMPORT
// ============================================================
function exportVoyages() {
  const blob = new Blob([JSON.stringify(state)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'mes-voyages.json';
  a.click();
}

function importVoyages(input) {
  const file = input.files[0];
  const reader = new FileReader();
  reader.onload = e => {
    state = JSON.parse(e.target.result);
    saveState();
    renderHome();
    toast("Voyages importés !");
  };
  reader.readAsText(file);
}

// ============================================================
// MODAL & UI
// ============================================================
function openNewVoyageModal() {
  document.getElementById('modal-overlay').classList.add('open');
  const sw = document.getElementById('color-swatches');
  sw.innerHTML = '';
  VOYAGE_COLORS.forEach(c => {
    const d = document.createElement('div');
    d.className = 'swatch';
    d.style.background = c;
    d.onclick = () => {
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
      d.classList.add('selected');
      d.dataset.color = c;
    };
    sw.appendChild(d);
  });
  sw.firstChild.click();
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

function confirmNewVoyage() {
  const name = document.getElementById('modal-name').value || 'Nouveau Voyage';
  const color = document.querySelector('.swatch.selected').dataset.color;
  const id = 'v' + Date.now();
  state.voyages.push({ id, name, color, etapes: [] });
  saveState();
  closeModal();
  openVoyage(id);
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.add('visible');
  setTimeout(() => t.classList.remove('visible'), 2500);
}

window.onload = () => { loadState(); renderHome(); };
</script>
